<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}NutriAI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="/">🥗 NutriAI</a>
      <ul class="nav-links">
        <li><a href="/"        class="nav-link {% if request.path=='/' %}active{% endif %}">Home</a></li>
        <li><a href="/recommend" class="nav-link {% if request.path=='/recommend' %}active{% endif %}">Recommend</a></li>
        <li><a href="/predict"  class="nav-link {% if request.path=='/predict' %}active{% endif %}">Predict</a></li>
        <li><a href="/explore"  class="nav-link {% if request.path=='/explore' %}active{% endif %}">Explore</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>🥗 NutriAI &mdash; Nutrition Recommendation System &nbsp;|&nbsp; Powered by KMeans Clustering</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
